<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Prediksi Toto Macau 5D</title>
<style>
  :root {
    --bg: #0d0d1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --accent: #f0a500;
    --text: #e0e0e0;
    --muted: #888;
    --green: #00c853;
    --red: #e94560;
    --border: rgba(240,165,0,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 2px solid var(--accent);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 1.1rem; color: var(--accent); font-weight: 700; }
  .header .subtitle { font-size: 0.7rem; color: var(--muted); }
  .time-badge { background: rgba(240,165,0,0.15); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; color: var(--accent); }

  .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { flex: 1; min-width: 70px; text-align: center; padding: 12px 6px; font-size: 0.78rem; cursor: pointer; color: var(--muted); border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { padding: 14px; max-width: 600px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  .session-banner {
    background: linear-gradient(135deg, var(--card2), var(--card));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .session-info .label { font-size: 0.72rem; color: var(--muted); margin-bottom: 2px; }
  .session-info .value { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .session-dots { display: flex; gap: 8px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid var(--muted); transition: all 0.3s; }
  .dot.done { background: var(--green); border-color: var(--green); }
  .dot.active { background: var(--accent); border-color: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

  .method-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
  .method-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: rgba(240,165,0,0.08); border-bottom: 1px solid var(--border); }
  .method-name { font-weight: 700; font-size: 0.85rem; color: var(--accent); }
  .method-desc { font-size: 0.7rem; color: var(--muted); }

  .copy-all-btn {
    background: var(--accent); color: #000; border: none;
    padding: 7px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 4px; transition: opacity 0.2s;
  }
  .copy-all-btn:active { opacity: 0.7; }

  .numbers-grid { padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .num-item {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 10px 12px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .num-item:active, .num-item:hover { background: rgba(240,165,0,0.1); border-color: rgba(240,165,0,0.4); }
  .num-item.copied { background: rgba(0,200,83,0.15); border-color: var(--green); }
  .num-rank { font-size: 0.65rem; color: var(--muted); min-width: 18px; }
  .num-value { font-size: 1.3rem; font-weight: 800; color: #fff; font-family: 'Courier New', monospace; letter-spacing: 2px; }
  .num-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .num-shio { font-size: 0.65rem; color: var(--accent); }
  .num-warna { font-size: 0.6rem; display: flex; gap: 1px; }
  .w-m { color: #e94560; }
  .w-h { color: #666; }

  .method-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .method-tab {
    padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; cursor: pointer;
    border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.2s;
  }
  .method-tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  /* Win Rate Card */
  .wr-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; margin-bottom: 14px;
  }
  .wr-title { font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .wr-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
  .wr-stat { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px; text-align: center; }
  .wr-stat .val { font-size: 1.6rem; font-weight: 800; }
  .wr-stat .lbl { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }
  .wr-bar-wrap { margin-top: 4px; }
  .wr-bar-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
  .wr-bar { height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .wr-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .wr-note { font-size: 0.72rem; color: var(--muted); margin-top: 10px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; }

  /* Form */
  .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .form-title { font-size: 0.9rem; font-weight: 700; color: var(--accent); margin-bottom: 14px; }
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .form-row input, .form-row select {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: #fff; padding: 10px 12px; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
  .form-row select option { background: #1a1a2e; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .submit-btn {
    width: 100%; padding: 13px; background: var(--accent); color: #000; border: none;
    border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
  }
  .submit-btn:active { opacity: 0.8; }
  .success-msg { background: rgba(0,200,83,0.15); border: 1px solid var(--green); border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: var(--green); margin-top: 10px; display: none; }
  .error-msg { background: rgba(233,69,96,0.15); border: 1px solid var(--red); border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: var(--red); margin-top: 10px; display: none; }
  .num-input-display { font-size: 2.2rem; font-family: 'Courier New', monospace; letter-spacing: 8px; font-weight: 800; text-align: center; color: var(--accent); margin: 8px 0 4px; min-height: 52px; }
  #nomorInput { font-size: 1.4rem; font-family: 'Courier New', monospace; letter-spacing: 4px; text-align: center; }

  /* History */
  .history-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
  .history-header { padding: 12px 14px; background: rgba(240,165,0,0.08); border-bottom: 1px solid var(--border); font-weight: 700; font-size: 0.85rem; color: var(--accent); }
  .history-item { padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .history-item:last-child { border-bottom: none; }
  .history-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .history-meta { font-size: 0.7rem; color: var(--muted); }
  .history-periode { font-size: 0.7rem; color: rgba(240,165,0,0.6); }
  .history-result { font-size: 1.25rem; font-weight: 800; font-family: 'Courier New', monospace; color: #fff; letter-spacing: 2px; cursor: pointer; }
  .history-result:hover { color: var(--accent); }
  .badge { font-size: 0.62rem; border-radius: 4px; padding: 2px 7px; font-weight: 700; }
  .badge-hit { background: rgba(0,200,83,0.2); color: var(--green); border: 1px solid rgba(0,200,83,0.3); }
  .badge-shio { background: rgba(240,165,0,0.15); color: var(--accent); border: 1px solid rgba(240,165,0,0.3); }
  .badge-miss { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }
  .history-row2 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .history-shio-txt { font-size: 0.68rem; color: var(--accent); }
  .pred-preview { font-size: 0.65rem; color: var(--muted); font-family: 'Courier New', monospace; }
  .edit-btn { background: none; border: 1px solid rgba(255,255,255,0.12); color: var(--muted); font-size: 0.65rem; padding: 2px 7px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .edit-inline { display: none; margin-top: 8px; padding: 10px; background: rgba(255,255,255,0.04); border-radius: 8px; border: 1px solid var(--border); }
  .edit-inline.open { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .edit-inline input { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; width: 120px; outline: none; }
  .edit-inline input:focus { border-color: var(--accent); }
  .save-btn { background: var(--accent); color: #000; border: none; padding: 6px 14px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .cancel-btn { background: none; border: 1px solid rgba(255,255,255,0.15); color: var(--muted); padding: 6px 12px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; }

  /* Paito */
  .paito-table { width: 100%; border-collapse: collapse; }
  .paito-table th { font-size: 0.68rem; color: var(--muted); padding: 6px 8px; text-align: left; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); }
  .paito-table td { padding: 7px 8px; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  .paito-table tr:last-child td { border-bottom: none; }
  .paito-num { font-family: 'Courier New', monospace; font-weight: 700; letter-spacing: 1px; }
  .color-dots { display: flex; gap: 3px; }
  .color-dot { width: 17px; height: 17px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 700; }
  .color-dot.m { background: rgba(233,69,96,0.25); color: #e94560; border: 1px solid #e94560; }
  .color-dot.h { background: rgba(80,80,80,0.2); color: #666; border: 1px solid #444; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,200,83,0.9); color: #000; padding: 10px 20px; border-radius: 8px; font-size: 0.82rem; font-weight: 700; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.85rem; }
  .spinner { width: 28px; height: 28px; border: 3px solid rgba(240,165,0,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (min-width: 480px) {
    .num-value { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🎯 Toto Macau 5D</h1>
    <div class="subtitle">Sistem Prediksi Otomatis</div>
  </div>
  <div class="time-badge" id="serverTime">--:--</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('prediksi')">Prediksi</div>
  <div class="tab" onclick="switchTab('input')">Input Hasil</div>
  <div class="tab" onclick="switchTab('history')">History</div>
  <div class="tab" onclick="switchTab('paito')">Paito</div>
  <div class="tab" onclick="switchTab('winrate')">Win Rate</div>
</div>

<div class="content">

  <!-- PREDIKSI TAB -->
  <div class="section active" id="tab-prediksi">
    <div class="session-banner">
      <div class="session-info">
        <div class="label">Prediksi Untuk</div>
        <div class="value" id="predTarget">Memuat...</div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:4px" id="jadwalInfo">
          Sesi 1: 15:15 WIB &nbsp;·&nbsp; Sesi 2: 21:15 WIB
        </div>
      </div>
      <div>
        <div style="font-size:0.68rem;color:var(--muted);text-align:right;margin-bottom:6px">Hari Ini</div>
        <div class="session-dots">
          <div class="dot" id="dot1" title="Sesi 1"></div>
          <div class="dot" id="dot2" title="Sesi 2"></div>
        </div>
      </div>
    </div>

    <div class="method-tabs">
      <button class="method-tab active" onclick="showMethod('gabungan')">Gabungan</button>
      <button class="method-tab" onclick="showMethod('paito')">Paito</button>
      <button class="method-tab" onclick="showMethod('shio')">Shio</button>
      <button class="method-tab" onclick="showMethod('ai')">AI</button>
      <button class="method-tab" onclick="showMethod('ekoras')">AS/Ekor</button>
      <button class="method-tab" onclick="showMethod('kopkep')">Kop·Kep</button>
      <button class="method-tab" onclick="showMethod('math')">Rumus</button>
      <button id="sesicorrTab" class="method-tab" onclick="showMethod('sesicorr')" style="display:none;background:rgba(138,43,226,0.1);border-color:rgba(138,43,226,0.4);color:#b06aff">Korls2</button>
    </div>
    <div class="method-tabs" style="margin-top:-6px">
      <button class="method-tab" onclick="showMethod('4d')" style="background:rgba(0,200,83,0.08);border-color:rgba(0,200,83,0.3);color:#00c853">4D</button>
      <button class="method-tab" onclick="showMethod('3d')" style="background:rgba(0,200,83,0.08);border-color:rgba(0,200,83,0.3);color:#00c853">3D</button>
      <button class="method-tab" onclick="showMethod('2d')" style="background:rgba(0,200,83,0.08);border-color:rgba(0,200,83,0.3);color:#00c853">2D</button>
    </div>

    <div id="prediksiContent">
      <div class="loading"><div class="spinner"></div>Memuat prediksi...</div>
    </div>
  </div>

  <!-- INPUT TAB -->
  <div class="section" id="tab-input">
    <div class="form-card">
      <div class="form-title">Input Hasil Keluaran</div>
      <div class="form-row-2">
        <div class="form-row">
          <label>Tanggal</label>
          <input type="date" id="inputTanggal">
        </div>
        <div class="form-row">
          <label>Sesi</label>
          <select id="inputSesi">
            <option value="1">Sesi 1</option>
            <option value="2">Sesi 2</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Nomor Periode (opsional)</label>
        <input type="number" id="inputPeriode" placeholder="contoh: 3388">
      </div>
      <div class="form-row">
        <label>Nomor Hasil (5 digit)</label>
        <input type="number" id="nomorInput" min="0" max="99999" placeholder="00000"
               oninput="updateDisplay(this.value)">
        <div class="num-input-display" id="numDisplay">—</div>
      </div>
      <button class="submit-btn" onclick="submitResult()">💾 Simpan Hasil</button>
      <div class="success-msg" id="successMsg"></div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="form-card">
      <div class="form-title" style="margin-bottom:8px">Status Hari Ini</div>
      <div id="todayStatus" style="font-size:0.82rem;color:var(--muted)">Memuat...</div>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div class="section" id="tab-history">
    <div id="historyContent">
      <div class="loading"><div class="spinner"></div>Memuat history...</div>
    </div>
  </div>

  <!-- PAITO TAB -->
  <div class="section" id="tab-paito">
    <div id="paitoContent">
      <div class="loading"><div class="spinner"></div>Memuat paito...</div>
    </div>
  </div>

  <!-- WIN RATE TAB -->
  <div class="section" id="tab-winrate">
    <div id="winrateContent">
      <div class="loading"><div class="spinner"></div>Menghitung win rate...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let currentTab = 'prediksi';
let currentMethod = 'gabungan';
let predData = null;
let statusData = null;
let gabunganSort = 'priority'; // 'priority' | 'konfirmasi'

function toggleGabunganSort() {
  gabunganSort = gabunganSort === 'priority' ? 'konfirmasi' : 'priority';
  if (predData) renderPredictions(predData);
}

document.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('inputTanggal').value = today;
  loadStatus();
  loadPredictions();
  setInterval(loadStatus, 60000);
});

function switchTab(name) {
  currentTab = name;
  const tabNames = ['prediksi','input','history','paito','winrate'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', tabNames[i] === name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'history') loadHistory();
  if (name === 'paito') loadPaito();
  if (name === 'winrate') loadWinRate();
  if (name === 'input') loadStatusForInput();
}

function showMethod(method) {
  currentMethod = method;
  document.querySelectorAll('.method-tab').forEach(t => {
    const fn = t.getAttribute('onclick') || '';
    const m = (fn.match(/showMethod\('(.+?)'\)/) || [])[1];
    t.classList.toggle('active', m === method);
  });
  if (predData) renderPredictions(predData);
}

async function loadStatus() {
  try {
    const res = await fetch('/status');
    statusData = await res.json();
    document.getElementById('serverTime').textContent = statusData.server_time;
    const d1 = document.getElementById('dot1');
    const d2 = document.getElementById('dot2');
    d1.className = 'dot' + (statusData.sesi1_done ? ' done' : ' active');
    d2.className = 'dot' + (statusData.sesi2_done ? ' done' : (statusData.sesi1_done ? ' active' : ''));
    const label = `Sesi ${statusData.next_sesi} — ${formatDate(statusData.next_tanggal)}`;
    document.getElementById('predTarget').textContent = label;
    // Tampilkan tab Korelasi Sesi hanya saat prediksi sesi 2
    const corrTab = document.getElementById('sesicorrTab');
    if (corrTab) corrTab.style.display = statusData.next_sesi === 2 ? 'inline' : 'none';
  } catch(e) {}
}

async function loadPredictions() {
  try {
    const res = await fetch('/predictions');
    predData = await res.json();
    renderPredictions(predData);
  } catch(e) {
    document.getElementById('prediksiContent').innerHTML = '<div class="loading">Gagal memuat prediksi</div>';
  }
}

function renderPredictions(data) {
  const method = currentMethod;
  const numbers = data[method] || [];

  const labels = {
    gabungan: { name: 'GABUNGAN 5D',       desc: 'Semua nomor unik dari: Paito · AI · Kop·Kep · Rumus · Shio · AS/Ekor — diurutkan prioritas<br><span style="font-size:0.62rem;opacity:0.8"><span style="color:var(--accent)">★ emas</span> = 3+ metode &nbsp;·&nbsp; <span style="color:#64b4ff">◆ biru</span> = 2 metode</span><br><span style="font-size:0.6rem;opacity:0.75;display:inline-flex;flex-wrap:wrap;gap:4px;margin-top:3px"><span style="background:rgba(79,195,247,0.15);color:#4fc3f7;border:1px solid #4fc3f740;padding:0 4px;border-radius:4px;font-weight:800">P</span>=Paito &nbsp;<span style="background:rgba(206,147,216,0.15);color:#ce93d8;border:1px solid #ce93d840;padding:0 4px;border-radius:4px;font-weight:800">AI</span>=AI &nbsp;<span style="background:rgba(129,199,132,0.15);color:#81c784;border:1px solid #81c78440;padding:0 4px;border-radius:4px;font-weight:800">S</span>=Shio &nbsp;<span style="background:rgba(255,183,77,0.15);color:#ffb74d;border:1px solid #ffb74d40;padding:0 4px;border-radius:4px;font-weight:800">E</span>=AS/Ekor &nbsp;<span style="background:rgba(77,208,225,0.15);color:#4dd0e1;border:1px solid #4dd0e140;padding:0 4px;border-radius:4px;font-weight:800">K</span>=Kop·Kep &nbsp;<span style="background:rgba(240,165,0,0.15);color:#f0a500;border:1px solid #f0a50040;padding:0 4px;border-radius:4px;font-weight:800">R</span>=Rumus &nbsp;<span style="background:rgba(176,106,255,0.15);color:#b06aff;border:1px solid #b06aff40;padding:0 4px;border-radius:4px;font-weight:800">C</span>=Korelasi</span>', badge: '5D' },
    paito:    { name: 'PAITO 5D',           desc: 'Pola warna M/H per posisi + streak detection', badge: '5D' },
    shio:     { name: 'SHIO 5D',            desc: 'Siklus 12 zodiak Tionghoa — due score + frekuensi', badge: '5D' },
    ai:       { name: 'AI 5D',              desc: 'Frekuensi + gap + tren + transisi + pair analysis', badge: '5D' },
    ekoras:   { name: 'AS / EKOR 5D',       desc: 'Fokus digit pertama (AS) & terakhir (Ekor) — hot+cold blend', badge: '5D' },
    kopkep:   { name: 'KOP · KEPALA 5D',    desc: 'Fokus posisi 2 (Kop) & 4 (Kepala) — frekuensi + gap due · bobot 2.5× lebih kuat', badge: '5D' },
    math:     { name: 'RUMUS MATEMATIK 5D', desc: 'Cermin · Jumlah digit · Delta ±1/5 · Cross AS↔Ekor — diranking frekuensi', badge: '5D' },
    sesicorr: { name: 'KORELASI SESI 5D',   desc: 'Pola hasil Sesi 1 → Sesi 2 dari data historis harian', badge: 'S2', special: true },
    '4d':     { name: 'GABUNGAN 4D',        desc: 'Suffix 4 digit dari semua nomor 5D + ekstra nomor 4D yang belum tercakup', badge: '4D', dedup: true },
    '3d':     { name: 'GABUNGAN 3D',        desc: 'Suffix 3 digit dari semua nomor 5D & 4D + ekstra nomor 3D yang belum tercakup', badge: '3D', dedup: true },
    '2d':     { name: 'GABUNGAN 2D',        desc: 'Suffix 2 digit dari semua nomor 5D, 4D & 3D + ekstra nomor 2D yang belum tercakup', badge: '2D', dedup: true },
  };

  const info = labels[method] || { name: method.toUpperCase(), desc: '' };
  const isSubDigit = ['4d','3d','2d'].includes(method);
  const isSpecial  = method === 'sesicorr';
  const isGabungan = method === 'gabungan';

  // Hitung dari metode mana tiap nomor berasal (untuk highlight + ikon sumber di Gabungan)
  const confirmCount = {};
  const methodSources = {}; // nomor -> ['P','AI',...]
  if (isGabungan) {
    const methodMeta = [
      { key:'paito',    label:'P',  color:'#4fc3f7', bg:'rgba(79,195,247,0.15)'  },
      { key:'ai',       label:'AI', color:'#ce93d8', bg:'rgba(206,147,216,0.15)' },
      { key:'shio',     label:'S',  color:'#81c784', bg:'rgba(129,199,132,0.15)' },
      { key:'ekoras',   label:'E',  color:'#ffb74d', bg:'rgba(255,183,77,0.15)'  },
      { key:'kopkep',   label:'K',  color:'#4dd0e1', bg:'rgba(77,208,225,0.15)'  },
      { key:'math',     label:'R',  color:'#f0a500', bg:'rgba(240,165,0,0.15)'   },
      { key:'sesicorr', label:'C',  color:'#b06aff', bg:'rgba(176,106,255,0.15)' },
    ];
    for (const mm of methodMeta) {
      for (const item of (data[mm.key] || [])) {
        confirmCount[item.nomor] = (confirmCount[item.nomor] || 0) + 1;
        if (!methodSources[item.nomor]) methodSources[item.nomor] = [];
        methodSources[item.nomor].push(mm);
      }
    }
  }

  if (!numbers.length) {
    const msg = isSubDigit
      ? '<div class="loading" style="color:var(--green)">✅ Semua nomor sudah tercakup dalam prediksi 5D — tidak ada tambahan</div>'
      : isSpecial
        ? '<div class="loading" style="color:#b06aff">⚠️ Korelasi sesi tersedia setelah hasil Sesi 1 masuk (15:15 WIB)</div>'
        : '<div class="loading">Belum ada prediksi</div>';
    document.getElementById('prediksiContent').innerHTML = msg;
    return;
  }

  const allNums = numbers.map(n => n.nomor).join('\n');
  const badgeStyle = isSubDigit
    ? 'background:rgba(0,200,83,0.2);color:#00c853;border:1px solid rgba(0,200,83,0.4)'
    : isSpecial
      ? 'background:rgba(138,43,226,0.2);color:#b06aff;border:1px solid rgba(138,43,226,0.4)'
      : 'background:rgba(240,165,0,0.2);color:var(--accent);border:1px solid var(--border)';

  let html = `
  <div class="method-card">
    <div class="method-header">
      <div>
        <div class="method-name" style="display:flex;align-items:center;gap:6px">
          ${info.name}
          <span style="font-size:0.65rem;padding:2px 7px;border-radius:10px;font-weight:700;${badgeStyle}">${info.badge||''}</span>
        </div>
        <div class="method-desc">${info.desc}</div>
        ${info.dedup ? `<div style="font-size:0.65rem;color:var(--green);margin-top:3px">✅ Nomor yang sudah ada di 5D tidak ditampilkan</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        ${isGabungan ? `<button onclick="toggleGabunganSort()" style="font-size:0.65rem;padding:3px 9px;border-radius:8px;border:1px solid ${gabunganSort==='konfirmasi'?'var(--accent)':'rgba(255,255,255,0.15)'};background:${gabunganSort==='konfirmasi'?'rgba(240,165,0,0.15)':'transparent'};color:${gabunganSort==='konfirmasi'?'var(--accent)':'var(--muted)'};cursor:pointer;white-space:nowrap">⬆ ${gabunganSort==='konfirmasi'?'Konfirmasi':'Prioritas'}</button>` : ''}
        <button class="copy-all-btn" onclick='copyAll(${JSON.stringify(allNums)})'>📋 Copy</button>
      </div>
    </div>
    <div class="numbers-grid">`;

  // Jika GABUNGAN dan sort aktif: urutkan nomor terbanyak konfirmasi di atas
  const displayNumbers = (isGabungan && gabunganSort === 'konfirmasi')
    ? [...numbers].sort((a, b) => (confirmCount[b.nomor]||0) - (confirmCount[a.nomor]||0))
    : numbers;

  displayNumbers.forEach((item, i) => {
    const wHtml = (item.warna||'').split('').map(c=>`<span class="w-${c.toLowerCase()}">${c}</span>`).join('');
    const cnt = isGabungan ? (confirmCount[item.nomor] || 0) : 0;
    const sources = isGabungan ? (methodSources[item.nomor] || []) : [];

    // Border highlight: 3+ metode = emas, 2 metode = biru
    let cardExtra = '';
    if (cnt >= 3) {
      cardExtra = 'style="border-color:var(--accent);box-shadow:0 0 8px rgba(240,165,0,0.3)"';
    } else if (cnt === 2) {
      cardExtra = 'style="border-color:rgba(100,180,255,0.5)"';
    }

    // Ikon sumber metode (P / AI / S / E / K / R / C)
    const sourcePills = sources.map(mm =>
      `<span style="font-size:0.55rem;font-weight:800;padding:1px 4px;border-radius:5px;background:${mm.bg};color:${mm.color};border:1px solid ${mm.color}40;line-height:1.4">${mm.label}</span>`
    ).join('');

    html += `
    <div class="num-item" ${cardExtra} onclick="copyNum('${item.nomor}', this)">
      <span class="num-rank">#${i+1}</span>
      <span class="num-value">${item.nomor}</span>
      <div class="num-right">
        <div class="num-shio">${item.shio||''}</div>
        ${sources.length ? `<div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:flex-end">${sourcePills}</div>` : ''}
        <div class="num-warna">${wHtml}</div>
        <span style="font-size:0.7rem;color:var(--muted)">📋</span>
      </div>
    </div>`;
  });

  html += `</div></div>`;
  document.getElementById('prediksiContent').innerHTML = html;
}

function copyNum(num, el) {
  navigator.clipboard.writeText(num).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = num; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  });
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 1500);
  showToast(`${num} disalin!`);
}

function copyAll(text) {
  navigator.clipboard.writeText(text).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  });
  showToast('Semua nomor disalin!');
}

function updateDisplay(val) {
  const el = document.getElementById('numDisplay');
  if (!val) { el.textContent = '—'; return; }
  el.textContent = String(val).padStart(5, '0').slice(-5);
}

async function submitResult() {
  const tanggal = document.getElementById('inputTanggal').value;
  const sesi = parseInt(document.getElementById('inputSesi').value);
  const nomor = document.getElementById('nomorInput').value.trim();
  const periode = parseInt(document.getElementById('inputPeriode').value) || 0;

  const successEl = document.getElementById('successMsg');
  const errorEl = document.getElementById('errorMsg');
  successEl.style.display = 'none';
  errorEl.style.display = 'none';

  if (!tanggal || !nomor) { errorEl.textContent = 'Tanggal dan nomor harus diisi'; errorEl.style.display = 'block'; return; }

  try {
    const res = await fetch('/results', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ periode, tanggal, sesi, nomor })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      successEl.textContent = `✅ ${data.message} — Prediksi sesi ${data.next_sesi} (${data.next_tanggal}) sudah siap!`;
      successEl.style.display = 'block';
      document.getElementById('nomorInput').value = '';
      document.getElementById('inputPeriode').value = '';
      document.getElementById('numDisplay').textContent = '—';
      await loadStatus();
      await loadPredictions();
      showToast('Hasil disimpan! Prediksi diperbarui.');
    } else { throw new Error(data.error || 'Gagal'); }
  } catch(e) { errorEl.textContent = 'Error: ' + e.message; errorEl.style.display = 'block'; }
}

async function loadStatusForInput() {
  await loadStatus();
  if (!statusData) return;
  let html = '';
  const s1 = statusData.sesi1_done
    ? `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span>✅ Sesi 1</span><span style="font-family:monospace;font-weight:700;color:var(--accent)">${statusData.sesi1_result}</span></div>`
    : `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);color:var(--muted)">⏳ Sesi 1 — Belum ada hasil</div>`;
  const s2 = statusData.sesi2_done
    ? `<div style="display:flex;justify-content:space-between;padding:8px 0"><span>✅ Sesi 2</span><span style="font-family:monospace;font-weight:700;color:var(--accent)">${statusData.sesi2_result}</span></div>`
    : `<div style="padding:8px 0;color:var(--muted)">⏳ Sesi 2 — Belum ada hasil</div>`;
  document.getElementById('todayStatus').innerHTML = s1 + s2;
}

async function loadHistory() {
  document.getElementById('historyContent').innerHTML = '<div class="loading"><div class="spinner"></div>Memuat...</div>';
  try {
    const res = await fetch('/history');
    const data = await res.json();
    renderHistory(data.history || []);
  } catch(e) {}
}

function renderHistory(history) {
  if (!history || !history.length) {
    document.getElementById('historyContent').innerHTML = '<div class="loading">Belum ada data</div>'; return;
  }
  let html = '<div class="history-card"><div class="history-header">📋 Riwayat Hasil Keluaran</div>';
  history.forEach((item, idx) => {
    const predNums = (item.predictions||'').split(',').map(s=>s.trim()).filter(Boolean);
    const badge = !predNums.length ? '' :
      item.is_hit ? '<span class="badge badge-hit">EXACT HIT</span>' :
      item.shio_hit ? '<span class="badge badge-shio">Shio Hit</span>' :
      '<span class="badge badge-miss">Miss</span>';

    const predPreview = predNums.length ? `<span class="pred-preview">${predNums.slice(0,5).join(' ')}</span>` : '';
    const periodeLabel = item.periode ? `#${item.periode}` : '<span style="color:rgba(255,255,255,0.25)">no#</span>';
    const editId = `edit-${idx}`;

    html += `
    <div class="history-item">
      <div class="history-row1">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <div class="history-meta">${formatDate(item.tanggal)} · Sesi ${item.sesi}</div>
          <span class="history-periode" style="cursor:default">${periodeLabel}</span>
          <button class="edit-btn" onclick="toggleEdit('${editId}','${item.tanggal}',${item.sesi},${item.periode||0})">✏️ edit#</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="history-result" onclick="copyNum('${item.nomor}',this)">${item.nomor}</span>
          ${badge}
        </div>
      </div>
      <div id="${editId}" class="edit-inline">
        <span style="font-size:0.75rem;color:var(--muted)">No. Periode:</span>
        <input type="number" id="inp-${editId}" placeholder="cth: 3388" value="${item.periode||''}">
        <button class="save-btn" onclick="savePeriode('${editId}','${item.tanggal}',${item.sesi})">Simpan</button>
        <button class="cancel-btn" onclick="toggleEdit('${editId}')">Batal</button>
      </div>
      <div class="history-row2">
        <span class="history-shio-txt">${getShio(item.nomor)}</span>
        ${predPreview}
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('historyContent').innerHTML = html;
}

function toggleEdit(id, tanggal, sesi, periode) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  if (el.classList.contains('open')) {
    const inp = document.getElementById('inp-' + id);
    if (inp) { inp.focus(); inp.select(); }
  }
}

async function savePeriode(id, tanggal, sesi) {
  const inp = document.getElementById('inp-' + id);
  const periode = parseInt(inp.value);
  if (!periode || periode <= 0) { showToast('Masukkan nomor periode yang valid'); return; }

  try {
    const res = await fetch('/results', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tanggal, sesi, periode })
    });
    const data = await res.json();
    if (data.success) {
      showToast(`Periode #${periode} disimpan!`);
      document.getElementById(id).classList.remove('open');
      await loadHistory();
    } else { showToast('Gagal menyimpan'); }
  } catch(e) { showToast('Error: ' + e.message); }
}

async function loadWinRate() {
  document.getElementById('winrateContent').innerHTML = '<div class="loading"><div class="spinner"></div>Menghitung...</div>';
  try {
    const res = await fetch('/winrate');
    const wr = await res.json();

function renderWinRate(wr) {
  const exactPct = wr.rate_exact ? wr.rate_exact.toFixed(2) : '0.00';
  const shioPct = wr.rate_shio ? wr.rate_shio.toFixed(2) : '0.00';
  const exactColor = wr.rate_exact > 5 ? 'var(--green)' : wr.rate_exact > 0 ? 'var(--accent)' : 'var(--muted)';
  const shioColor = wr.rate_shio > 30 ? 'var(--green)' : wr.rate_shio > 10 ? 'var(--accent)' : 'var(--muted)';

  let html = `
  <div class="wr-card">
    <div class="wr-title">📊 Win Rate Prediksi GABUNGAN</div>
    <div class="wr-grid">
      <div class="wr-stat">
        <div class="val" style="color:${exactColor}">${exactPct}%</div>
        <div class="lbl">Exact Hit Rate</div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:2px">${wr.wins} dari ${wr.total}</div>
      </div>
      <div class="wr-stat">
        <div class="val" style="color:${shioColor}">${shioPct}%</div>
        <div class="lbl">Shio Hit Rate</div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:2px">${wr.shio_wins} dari ${wr.total}</div>
      </div>
    </div>

    <div class="wr-bar-wrap">
      <div class="wr-bar-label"><span>Exact (5D tepat)</span><span>${exactPct}%</span></div>
      <div class="wr-bar"><div class="wr-bar-fill" style="width:${Math.min(wr.rate_exact||0,100)}%;background:var(--green)"></div></div>
    </div>
    <div class="wr-bar-wrap" style="margin-top:8px">
      <div class="wr-bar-label"><span>Shio (zodiak cocok)</span><span>${shioPct}%</span></div>
      <div class="wr-bar"><div class="wr-bar-fill" style="width:${Math.min(wr.rate_shio||0,100)}%;background:var(--accent)"></div></div>
    </div>

    <div class="wr-note">
      <strong>Cara hitung Win Rate:</strong><br>
      • <strong>Exact Hit</strong> = nomor hasil keluaran ada persis di 10 prediksi GABUNGAN<br>
      • <strong>Shio Hit</strong> = shio hasil cocok dengan salah satu shio dalam prediksi<br>
      • Total sesi dihitung hanya yang punya prediksi (${wr.total} sesi)<br><br>
      <strong>Catatan:</strong> Exact hit 5D murni probabilistik (10/100.000 = 0.01%). Shio hit (10 dari 12 shio mungkin cocok) lebih realistis sebagai ukuran kualitas.
    </div>
  </div>

  <div class="wr-card">
    <div class="wr-title">📈 Penjelasan Metode Prediksi</div>
    <div style="font-size:0.8rem;line-height:1.7;color:var(--muted)">
      <p><strong style="color:var(--accent)">Paito</strong> — Pola warna M (ganjil) / H (genap) per posisi. Streak ≥3 → prediksi reversal. Boost 3 draw terbaru untuk akurasi.</p>
      <p style="margin-top:8px"><strong style="color:var(--accent)">Shio</strong> — 12 zodiak Tionghoa dari 2 digit terakhir. Cari shio "due" (jarang muncul) lalu generate nomor sesuai.</p>
      <p style="margin-top:8px"><strong style="color:var(--accent)">AI</strong> — Frekuensi + gap analysis + tren + <em>transisi digit</em> (digit apa yang biasa muncul setelah digit tertentu) + <em>pair analysis</em> (korelasi digit antar posisi bersebelahan).</p>
      <p style="margin-top:8px"><strong style="color:var(--accent)">AS/Ekor</strong> — Fokus digit pertama (AS) dan terakhir (Ekor) menggunakan blended hot+cold score. Middle digit pakai frekuensi umum.</p>
      <p style="margin-top:8px"><strong style="color:var(--accent)">Gabungan</strong> — Paito + AI + Shio + AS/Ekor digabung (10 nomor). Slot kosong diisi <em>cold numbers</em> (digit yang belum muncul lama) — <strong>bukan random</strong>.</p>
      <p style="margin-top:8px"><strong style="color:#00c853">4D / 3D / 2D</strong> — Analisis khusus pada digit terakhir 4/3/2. <strong>Otomatis deduplikasi</strong>: jika suffix-nya sudah ada di 5D, tidak ditampilkan ulang.</p>
    </div>
  </div>`;

  document.getElementById('winrateContent').innerHTML = html;
}

// Helpers
const shioList = ['Tikus','Kerbau','Macan','Kelinci','Naga','Ular','Kuda','Kambing','Monyet','Ayam','Anjing','Babi'];
function getShio(nomor) {
  if (!nomor || nomor.length < 2) return '';
  return shioList[parseInt(nomor.slice(-2)||'0') % 12];
}

function formatDate(d) {
  if (!d) return '';
  const p = d.split('-');
  if (p.length !== 3) return d;
  return `${p[2]} ${['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][parseInt(p[1])-1]} ${p[0]}`;
}
function formatDateShort(d) {
  if (!d) return '';
  const p = d.split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}` : d;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
